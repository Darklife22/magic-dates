pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    // Mantén estas versiones, pero asegúrate de que el build.gradle de tu app las use correctamente
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.6.0" apply false
    
    // Si el error 'Unresolved reference' sigue, intenta bajar esta a 1.9.24 temporalmente
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    
    id "com.google.gms.google-services" version "4.4.1" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google() // Aquí están las anotaciones de Android
        mavenCentral()
        maven {
            url "https://storage.googleapis.com/download.flutter.io" // Aquí está Flutter
        }
    }
}

include ":app"